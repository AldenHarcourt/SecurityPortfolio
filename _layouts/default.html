<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/styles.css' | relative_url }}">
</head>
<body>
  <header class="header">
    <h1>{{ site.title }}</h1>
    {% include nav.html %}
  </header>
  
  <main class="main-content">
    {{ content }}
  </main>
  
  <footer class="footer">
    <p>&copy; {{ site.time | date: "%Y" }} Alden Harcourt</p>
  </footer>
</body>
</html>
